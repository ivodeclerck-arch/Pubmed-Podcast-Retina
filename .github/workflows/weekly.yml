name: Weekly PubMed Digest

on:
  schedule:
    # Runs every Monday at 01:00 UTC (≈ 02:00–03:00 Belgian time)
    # cron format: minute hour day-of-month month day-of-week
    # day-of-week: 0=Sun, 1=Mon, ..., 6=Sat
    - cron: '0 1 * * 1'
  # Lets you trigger a run manually from the Actions tab
  workflow_dispatch:

# Permissions needed to commit and push the new MP3 + feed back to the repo
permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run the digest script
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OUTPUT_DIR: docs
          PODCAST_BASE_URL: ${{ vars.PODCAST_BASE_URL }}
        run: python script.py

      - name: Commit and push results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --staged --quiet || git commit -m "Weekly digest: $(date -u +%Y-%m-%d)"
          git push
